<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
:root{--bg:#fff;--s1:#f7f7f7;--s2:#eeeeee;--s3:#d4d4d4;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--txt:#0a0a0a;--txt2:#505050;--txt3:#a0a0a0;--acc:#0a0a0a;--acc-inv:#fff;--grn:#1a7a35;--red:#b83228;--r:12px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:82px;}
.hdr{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:13px 18px 12px;}
.logo-svg{height:22px;width:auto;display:block;}
.hdate{font-size:11px;color:var(--txt3);letter-spacing:.2px;}
.panel{display:none;padding:14px 16px 0;}.panel.on{display:block;}
.slbl{font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin:22px 0 8px 1px;display:flex;align-items:center;gap:8px;}.slbl:first-child{margin-top:2px;}.slbl::after{content:'';flex:1;height:1px;background:var(--border2);}
.card{background:var(--bg);border-radius:var(--r);overflow:hidden;margin-bottom:10px;border:1px solid var(--border2);}
.days{display:flex;gap:5px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none;}.days::-webkit-scrollbar{display:none;}
.daybtn{flex-shrink:0;width:42px;height:50px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg);color:var(--txt2);font-size:11px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s;}.daybtn .dn{font-size:13px;font-weight:800;}.daybtn .dd{font-size:10px;color:var(--txt3);}.daybtn.on{background:var(--acc);border-color:var(--acc);color:var(--acc-inv);}.daybtn.on .dd{color:rgba(255,255,255,.5);}.daybtn.today:not(.on){border-color:var(--acc);color:var(--acc);}
.prow{display:flex;align-items:center;padding:11px 13px;border-bottom:1px solid var(--border);gap:10px;transition:background .1s;}.prow:last-child{border-bottom:none;}.prow:active{background:var(--s1);}.prow.chk{opacity:.36;}
.chkbox{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;}.prow.chk .chkbox{background:var(--acc);border-color:var(--acc);color:#fff;}
.pi{flex:1;min-width:0;}.pname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.prow.chk .pname{text-decoration:line-through;color:var(--txt3);}.pnote{font-size:11px;color:var(--txt3);margin-top:2px;}
.prep-txt-inp{flex-shrink:0;width:120px;height:30px;border:1px solid var(--border2);border-radius:6px;background:var(--s1);color:var(--txt);font-family:inherit;font-size:13px;text-align:right;outline:none;padding:0 9px;}.prep-txt-inp:focus{border-color:var(--acc);background:var(--bg);}.prep-txt-inp::placeholder{color:var(--txt3);}.ocard-edit{padding:8px 10px;border-top:1px solid var(--border);display:none;}.ocard-edit.open{display:block;}.oedit-row{display:flex;align-items:center;padding:7px 4px;border-bottom:1px solid var(--border);gap:7px;}.oedit-row:last-child{border-bottom:none;}.oedit-name{flex:1;min-width:0;}.oedit-name input{background:transparent;border:none;color:var(--txt);font-family:inherit;font-size:13px;font-weight:500;width:100%;outline:none;}.oedit-name input:focus{color:var(--acc);}.oedit-meta{font-size:10px;color:var(--txt3);white-space:nowrap;}.oedit-ico{font-size:14px;cursor:pointer;padding:2px 3px;background:none;border:none;}.oedit-ico.del{color:var(--red);}.oedit-ico.cfg{color:var(--txt3);}.oadd-row{display:flex;gap:6px;padding:7px 4px 4px;}.oadd-inp{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:var(--rs);padding:8px 11px;color:var(--txt);font-family:inherit;font-size:13px;outline:none;}.oadd-inp:focus{border-color:var(--acc);}.oadd-inp::placeholder{color:var(--txt3);}.oadd-btn{padding:8px 13px;background:var(--acc);border:none;border-radius:var(--rs);color:#fff;font-weight:800;font-size:15px;font-family:inherit;cursor:pointer;}
.stock-card{background:var(--bg);border-radius:var(--r);border:1px solid var(--border2);overflow:hidden;margin-bottom:10px;}
.stock-ttl{padding:12px 14px;border-bottom:1px solid var(--border2);}
.stock-name-inp{background:transparent;border:none;color:var(--txt);font-family:inherit;font-size:14px;font-weight:700;width:100%;outline:none;letter-spacing:.2px;}.stock-name-inp:focus{color:var(--acc);}
.stock-rows{padding:4px 0;}
.stock-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px;}.stock-row:last-child{border-bottom:none;}
.stock-lbl{font-size:12px;color:var(--txt2);width:52px;flex-shrink:0;font-weight:500;}
.stock-inp{flex:1;height:32px;border:1px solid var(--border2);border-radius:6px;background:var(--s1);color:var(--txt);font-family:inherit;font-size:14px;font-weight:600;text-align:right;outline:none;padding:0 10px;}.stock-inp:focus{border-color:var(--acc);background:var(--bg);}.stock-inp.result{background:var(--s2);border-color:transparent;font-weight:700;}.stock-inp.result.neg{color:var(--red);}
.stock-unit{font-size:11px;color:var(--txt3);width:22px;flex-shrink:0;}
.export-btn{width:100%;padding:14px;border-radius:var(--r);border:1.5px solid var(--acc);background:transparent;color:var(--acc);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;margin-top:10px;margin-bottom:4px;}.export-btn:active{background:var(--s1);}
.odate{background:var(--bg);border-radius:var(--r);padding:11px 14px;margin-bottom:10px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}.odate-l{font-size:12px;color:var(--txt2);}.odate-v{font-size:12px;font-weight:700;}
.vhd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border2);}.vname{font-size:13px;font-weight:700;letter-spacing:.2px;}.vstatus{font-size:11px;color:var(--txt3);}
.orow{display:flex;align-items:center;padding:10px 13px;border-bottom:1px solid var(--border);gap:10px;}.orow:last-child{border-bottom:none;}.oname{flex:1;min-width:0;}
.qctrl{display:flex;align-items:center;gap:7px;flex-shrink:0;}.qbtn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:var(--bg);color:var(--txt);font-size:17px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;}.qbtn:active{background:var(--s2);transform:scale(.9);}
.qval{min-width:26px;text-align:center;font-size:16px;font-weight:700;}.qval.z{color:var(--txt3);}.qunit{font-size:10px;color:var(--txt3);min-width:18px;}
.send-area{padding:12px 16px 0;}.btn-kk{width:100%;padding:15px;border-radius:var(--r);border:none;background:#fee500;color:#3b1e08;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:9px;transition:all .15s;}.btn-kk:active{transform:scale(.98);opacity:.88;}.btn-ol{width:100%;padding:14px;border-radius:var(--r);border:1.5px solid var(--acc);background:transparent;color:var(--acc);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;}.btn-ol:active{background:var(--s1);}
.etbar{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;}.etool{padding:8px 13px;border-radius:20px;border:1px solid var(--border2);background:var(--bg);color:var(--txt2);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap;}.etool.on{background:var(--acc);border-color:var(--acc);color:#fff;}.etool:active{opacity:.7;}
.esec{margin-bottom:16px;}.esec-head{display:flex;align-items:center;gap:8px;margin-bottom:7px;}.esec-title{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:var(--rs);padding:8px 11px;color:var(--txt);font-size:13px;font-weight:700;font-family:inherit;outline:none;}.esec-title:focus{border-color:var(--acc);}
.ecard{background:var(--bg);border-radius:var(--r);border:1px solid var(--border2);overflow:hidden;}.erow{display:flex;align-items:center;padding:10px 11px;border-bottom:1px solid var(--border);gap:8px;}.erow:last-child{border-bottom:none;}.ename{flex:1;min-width:0;}.ename input{background:transparent;border:none;color:var(--txt);font-family:inherit;font-size:14px;font-weight:500;width:100%;outline:none;}.ename input:focus{color:var(--acc);}.emeta{font-size:10px;color:var(--txt3);white-space:nowrap;}
.eico{font-size:15px;cursor:pointer;padding:3px 4px;line-height:1;flex-shrink:0;background:none;border:none;}.eico.del{color:var(--red);}.eico.cfg{color:var(--txt3);}
.add-row{display:flex;gap:7px;padding:8px;}.add-inp{flex:1;background:var(--s1);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 13px;color:var(--txt);font-family:inherit;font-size:14px;outline:none;}.add-inp:focus{border-color:var(--acc);}.add-inp::placeholder{color:var(--txt3);}.add-btn{padding:10px 15px;background:var(--acc);border:none;border-radius:var(--rs);color:#fff;font-weight:800;font-size:16px;font-family:inherit;cursor:pointer;}
.hcard{background:var(--bg);border-radius:var(--r);border:1px solid var(--border2);margin-bottom:9px;overflow:hidden;}.hcard-top{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.hcard-date{font-size:12px;font-weight:600;}.hcard-view{padding:5px 11px;background:var(--s1);border:1px solid var(--border2);color:var(--txt2);border-radius:var(--rs);font-size:11px;font-family:inherit;cursor:pointer;}.hchips{padding:9px 13px;display:flex;gap:5px;flex-wrap:wrap;}.hchip{font-size:11px;color:var(--txt2);background:var(--s1);padding:3px 9px;border-radius:20px;border:1px solid var(--border);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:flex-end;justify-content:center;}.overlay.on{display:flex;}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;border-top:1px solid var(--border2);}.sheet-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:12px auto 0;}.sbody{padding:18px 18px 34px;}.stitle{font-size:16px;font-weight:700;margin-bottom:16px;}.stext{background:var(--s1);border-radius:var(--rs);padding:14px;font-size:13px;line-height:1.95;color:var(--txt);white-space:pre-wrap;font-family:'Noto Sans KR',monospace;border:1px solid var(--border2);margin-bottom:16px;max-height:55vh;overflow-y:auto;}.sbtns{display:flex;gap:9px;}.sbtn{flex:1;padding:14px;border-radius:var(--rs);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:all .15s;}.sbtn:active{transform:scale(.97);}.sbtn.main{background:var(--acc);color:#fff;}.sbtn.sub{background:var(--s2);color:var(--txt);}
.sfield{margin-bottom:11px;}.sfield label{font-size:11px;color:var(--txt2);display:block;margin-bottom:4px;font-weight:600;letter-spacing:.3px;}.sfield input,.sfield select{width:100%;background:var(--s1);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 12px;color:var(--txt);font-family:inherit;font-size:14px;outline:none;}.sfield input:focus,.sfield select:focus{border-color:var(--acc);}.sfield select option{background:#fff;}.sfrow{display:flex;gap:9px;}.sfrow .sfield{flex:1;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border2);display:flex;z-index:100;}.ni{flex:1;padding:10px 0 9px;text-align:center;cursor:pointer;}.ni .nic{font-size:19px;display:block;}.ni .nlbl{font-size:10px;color:var(--txt3);display:block;margin-top:2px;font-weight:600;letter-spacing:.3px;}.ni.on .nlbl{color:var(--acc);}.nbdg-w{position:relative;display:inline-block;}.nbdg{position:absolute;top:-3px;right:-7px;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:1px 4px;border-radius:8px;min-width:14px;display:none;line-height:1.4;}.nbdg.on{display:block;}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(10,10,10,.9);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;}.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:60px 20px;color:var(--txt3);}.empty-ic{font-size:40px;margin-bottom:12px;display:block;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--s3);}
</style>

<script>
(function(){
  // Generate apple-touch-icon using canvas at page load
  var c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  var ctx = c.getContext('2d');

  // Black rounded rect background
  var r = 115;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(512-r, 0);
  ctx.quadraticCurveTo(512, 0, 512, r);
  ctx.lineTo(512, 512-r);
  ctx.quadraticCurveTo(512, 512, 512-r, 512);
  ctx.lineTo(r, 512);
  ctx.quadraticCurveTo(0, 512, 0, 512-r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#0a0a0a';
  ctx.fill();

  // Draw SOIGNÉ text in white
  // Use a clean serif-like rendering with canvas text
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Try to use a nice font
  var fontSize = 118;
  ctx.font = '300 ' + fontSize + 'px Georgia, "Times New Roman", serif';
  ctx.letterSpacing = '18px';

  // Draw SOIGN first, then É separately for accent
  ctx.fillText('SOIGNÉ', 256, 256);

  // Set as apple-touch-icon
  var dataURL = c.toDataURL('image/png');
  var link = document.getElementById('appIcon');
  if(link) link.href = dataURL;

  // Also set as favicon
  var favicon = document.createElement('link');
  favicon.rel = 'icon';
  favicon.type = 'image/png';
  favicon.href = dataURL;
  document.head.appendChild(favicon);
})();
</script>

<script>
const DEFAULTS={vendors:[{id:'vs',name:'수산 업체',emoji:'🐟',contact:''},{id:'vn',name:'농산 업체',emoji:'🥬',contact:''},{id:'vk',name:'식자재 업체',emoji:'🏪',contact:''},{id:'vi',name:'인터넷 주문',emoji:'🛒',contact:''},{id:'vm',name:'마켓컬리',emoji:'🟣',contact:''},{id:'vc',name:'코퍼트',emoji:'🧈',contact:''},{id:'vch',name:'쉐프스푸드',emoji:'👨‍🍳',contact:''},{id:'vb',name:'비미리야 캐비어',emoji:'🫧',contact:''},{id:'vg',name:'굿푸드',emoji:'🌿',contact:''}],sections:[{id:'s1',title:'소스 & 오일',items:[{id:'a01',name:'쪽파 치미추리',note:'허브 소스',vendor:'vn',unit:'g'},{id:'a02',name:'다시마 비네그렛',note:'드레싱',vendor:'vk',unit:'g'},{id:'a03',name:'막걸리 크림',note:'소스',vendor:'vk',unit:'g'},{id:'a04',name:'흑마늘잼',note:'',vendor:'vk',unit:'g'},{id:'a05',name:'배 피클',note:'',vendor:'vn',unit:'g'},{id:'a06',name:'청겨자',note:'',vendor:'vk',unit:'g'},{id:'a07',name:'들기름',note:'',vendor:'vk',unit:'ml'},{id:'a08',name:'믹스 식초',note:'',vendor:'vk',unit:'ml'},{id:'a09',name:'오일',note:'',vendor:'vk',unit:'ml'}]},{id:'s2',title:'어류 & 육류 작업',items:[{id:'b01',name:'고등어 타르트',note:'전처리',vendor:'vs',unit:'kg'},{id:'b02',name:'산방어',note:'손질',vendor:'vs',unit:'kg'},{id:'b03',name:'미나리 물회',note:'물회 세팅',vendor:'vs',unit:'인분'},{id:'b04',name:'송어',note:'손질',vendor:'vs',unit:'kg'},{id:'b05',name:'황태채',note:'건어류 불림',vendor:'vi',unit:'g'},{id:'b06',name:'보푸라기',note:'어류 보푸라기',vendor:'vs',unit:'g'},{id:'b07',name:'두께살',note:'육류 손질',vendor:'vk',unit:'kg'},{id:'b08',name:'덕 칩',note:'오리칩',vendor:'vk',unit:'g'},{id:'b09',name:'훈연',note:'훈연 작업',vendor:'vk',unit:'회'}]},{id:'s3',title:'채소 & 가니쉬',items:[{id:'c01',name:'깐양파',note:'손질',vendor:'vn',unit:'kg'},{id:'c02',name:'벌 샬롯',note:'손질',vendor:'vn',unit:'kg'},{id:'c03',name:'홍고추',note:'',vendor:'vn',unit:'kg'},{id:'c04',name:'청양고추',note:'',vendor:'vn',unit:'kg'},{id:'c05',name:'영양부추',note:'',vendor:'vn',unit:'kg'},{id:'c06',name:'배추육수',note:'육수 작업',vendor:'vn',unit:'L'},{id:'c07',name:'삼게 액젓',note:'',vendor:'vk',unit:'ml'}]},{id:'s4',title:'건식재료',items:[{id:'d01',name:'감자전분',note:'',vendor:'vk',unit:'g'},{id:'d02',name:'참깨',note:'',vendor:'vk',unit:'g'},{id:'d03',name:'땅콩 컷',note:'',vendor:'vk',unit:'g'},{id:'d04',name:'생은행',note:'인터넷',vendor:'vi',unit:'g'},{id:'d05',name:'햇 생율밤',note:'계절재료',vendor:'vi',unit:'g'},{id:'d06',name:'차조',note:'잡곡',vendor:'vi',unit:'g'},{id:'d07',name:'기장',note:'잡곡',vendor:'vi',unit:'g'},{id:'d08',name:'포하 (압착쌀)',note:'',vendor:'vk',unit:'g'},{id:'d09',name:'미역쿡',note:'',vendor:'vk',unit:'g'},{id:'d10',name:'톳쿡',note:'',vendor:'vk',unit:'g'},{id:'d11',name:'판 젤라틴',note:'',vendor:'vk',unit:'장'},{id:'d12',name:'렌즈콩',note:'',vendor:'vk',unit:'g'},{id:'d13',name:'커민',note:'스파이스',vendor:'vk',unit:'g'},{id:'d14',name:'호로파',note:'스파이스',vendor:'vk',unit:'g'},{id:'d15',name:'트러플',note:'',vendor:'vk',unit:'g'},{id:'d17',name:'반죽',note:'기본 반죽',vendor:'vk',unit:'개'},{id:'d18',name:'카라멜',note:'',vendor:'vk',unit:'g'}]},{id:'s5',title:'버터 & 유제품',items:[{id:'e01',name:'계란',note:'',vendor:'vm',unit:'개'},{id:'e02',name:'서울우유',note:'',vendor:'vm',unit:'L'},{id:'e03',name:'켄 버터',note:'발효버터',vendor:'vc',unit:'g'},{id:'e04',name:'로이온 버터',note:'',vendor:'vc',unit:'g'}]},{id:'s6',title:'음료 & 주류',items:[{id:'f01',name:'오름 선발주',note:'음료 선발주',vendor:'vk',unit:'병'},{id:'f02',name:'장수 막걸리',note:'',vendor:'vk',unit:'병'}]}],stocks:[{id:'st1',name:'캐비어',unit:'g'},{id:'st2',name:'송어알',unit:'g'},{id:'st3',name:'칩 (1)',unit:'g'},{id:'st4',name:'칩 (2)',unit:'g'}]};
const TODAY=new Date(),DAYS=['일','월','화','수','목','금','토'];
function mkDB(){return{vendors:JSON.parse(JSON.stringify(DEFAULTS.vendors)),sections:JSON.parse(JSON.stringify(DEFAULTS.sections)),stocks:JSON.parse(JSON.stringify(DEFAULTS.stocks)),checks:{},qtys:{},prepQtys:{},stockVals:{},history:[]};}
function loadDB(){try{const r=localStorage.getItem('sg_v3');if(r)return JSON.parse(r);}catch(e){}return mkDB();}
function save(){localStorage.setItem('sg_v3',JSON.stringify(DB));}
let DB=loadDB();
if(!DB.stocks)DB.stocks=JSON.parse(JSON.stringify(DEFAULTS.stocks));
if(!DB.stockVals)DB.stockVals={};
if(!DB.prepQtys)DB.prepQtys={};
let selDay=TODAY.getDay(),curTab='prep',editMode='prep',sendTxt='';
function go(t){curTab=t;['prep','order','hist','edit'].forEach(x=>{document.getElementById('panel-'+x).classList.toggle('on',x===t);document.getElementById('nav-'+x).classList.toggle('on',x===t);});if(t==='order')renderOrder();if(t==='hist')renderHist();if(t==='edit')renderEdit();}
function init(){document.getElementById('hdate').textContent=TODAY.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});const od=new Date(TODAY);od.setDate(TODAY.getDate()+1);document.getElementById('odateV').textContent=od.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});renderDays();renderPrep();renderStock();badge();}
function renderDays(){const c=document.getElementById('dayRow');c.innerHTML='';for(let i=0;i<7;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-TODAY.getDay()+i);const b=document.createElement('div');b.className='daybtn'+(i===selDay?' on':'')+(i===TODAY.getDay()&&i!==selDay?' today':'');b.innerHTML=`<span class="dn">${DAYS[i]}</span><span class="dd">${d.getDate()}</span>`;b.onclick=()=>{selDay=i;renderDays();renderPrep();};c.appendChild(b);}}
function pkey(id){const ws=new Date(TODAY);ws.setDate(TODAY.getDate()-TODAY.getDay());return`${id}_${ws.toISOString().slice(0,10)}_${selDay}`;}
function pqkey(id){return pkey(id)+'_qty';}
function renderPrep(){const c=document.getElementById('prepC');c.innerHTML='';DB.sections.forEach(sec=>{if(!sec.items.length)return;const lbl=document.createElement('div');lbl.className='slbl';lbl.textContent=sec.title;c.appendChild(lbl);const card=document.createElement('div');card.className='card';sec.items.forEach(item=>{const k=pkey(item.id),chk=!!DB.checks[k],qk=pqkey(item.id),qval=DB.prepQtys[qk]||'';const row=document.createElement('div');row.className='prow'+(chk?' chk':'');row.innerHTML=`<div class="chkbox" data-id="${item.id}">${chk?'✓':''}</div><div class="pi"><div class="pname">${item.name}</div>${item.note?`<div class="pnote">${item.note}</div>`:''}</div><input class="prep-txt-inp" type="text" placeholder="작업량 입력" value="${esc(qval)}" id="pq_${item.id}" onclick="event.stopPropagation()" onchange="savePrepQty('${item.id}',this.value)">`;row.querySelector('.chkbox').addEventListener('click',e=>{e.stopPropagation();DB.checks[k]=!DB.checks[k];save();renderPrep();});card.appendChild(row);});c.appendChild(card);});}
function savePrepQty(id,val){DB.prepQtys[pqkey(id)]=val;save();}
function stockKey(id){return id+'_'+TODAY.toISOString().slice(0,10);}
function renderStock(){const c=document.getElementById('stockC');c.innerHTML='';DB.stocks.forEach(st=>{const sk=stockKey(st.id);if(!DB.stockVals[sk])DB.stockVals[sk]={in:'',use:''};const sv=DB.stockVals[sk],inV=parseFloat(sv.in)||0,useV=parseFloat(sv.use)||0,rem=sv.in===''&&sv.use===''?'':inV-useV,isNeg=typeof rem==='number'&&rem<0;const card=document.createElement('div');card.className='stock-card';card.innerHTML=`<div class="stock-ttl"><input class="stock-name-inp" value="${esc(st.name)}" onchange="renStock('${st.id}',this.value)" onclick="event.stopPropagation()"></div><div class="stock-rows"><div class="stock-row"><span class="stock-lbl">입고량</span><input class="stock-inp" type="number" inputmode="decimal" placeholder="0" value="${sv.in}" id="si_in_${st.id}" onchange="saveStock('${st.id}','in',this.value)"><span class="stock-unit">${st.unit}</span></div><div class="stock-row"><span class="stock-lbl">사용량</span><input class="stock-inp" type="number" inputmode="decimal" placeholder="0" value="${sv.use}" id="si_use_${st.id}" onchange="saveStock('${st.id}','use',this.value)"><span class="stock-unit">${st.unit}</span></div><div class="stock-row"><span class="stock-lbl">재고</span><input class="stock-inp result${isNeg?' neg':''}" readonly value="${rem===''?'':rem}" id="si_rem_${st.id}"><span class="stock-unit">${st.unit}</span></div></div>`;c.appendChild(card);});}
function saveStock(stId,field,val){const sk=stockKey(stId);if(!DB.stockVals[sk])DB.stockVals[sk]={in:'',use:''};DB.stockVals[sk][field]=val;save();const sv=DB.stockVals[sk],inV=parseFloat(sv.in)||0,useV=parseFloat(sv.use)||0,rem=sv.in===''&&sv.use===''?'':inV-useV,el=document.getElementById('si_rem_'+stId);if(el){el.value=rem===''?'':rem;el.classList.toggle('neg',typeof rem==='number'&&rem<0);}}
function renStock(stId,val){const st=DB.stocks.find(x=>x.id===stId);if(st){st.name=val;save();}}
function openPrepExport(){const dayStr=DAYS[selDay]+'요일';let txt=`[ SOIGNÉ 프렙 — ${TODAY.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})} ${dayStr} ]\n${'─'.repeat(28)}\n\n프렙\n`;let anyPrep=false;DB.sections.forEach(sec=>{sec.items.forEach(item=>{const k=pkey(item.id),chk=!!DB.checks[k],qk=pqkey(item.id),qval=DB.prepQtys[qk]||'';if(chk||qval){txt+=`${item.name} — ${qval?qval+item.unit:'완료'}\n`;anyPrep=true;}});});if(!anyPrep)txt+='(없음)\n';txt+='\n';DB.stocks.forEach(st=>{const sk=stockKey(st.id),sv=DB.stockVals[sk]||{in:'',use:''};const inV=parseFloat(sv.in)||0,useV=parseFloat(sv.use)||0,rem=sv.in===''&&sv.use===''?'-':String(inV-useV)+st.unit;txt+=`${st.name} 재고\n입고량 — ${sv.in?sv.in+st.unit:'-'}\n사용량 — ${sv.use?sv.use+st.unit:'-'}\n재고 — ${rem}\n\n`;});txt+='─'.repeat(28);sendTxt=txt;document.getElementById('sbody').innerHTML=`<div class="stitle">📋 프렙 리포트</div><div class="stext">${esc(txt)}</div><div class="sbtns"><button class="sbtn sub" onclick="closeOv()">닫기</button><button class="sbtn main" onclick="doCopy()">복사하기</button></div>`;document.getElementById('overlay').classList.add('on');}
function renderOrder(){const c=document.getElementById('orderC');c.innerHTML='';DB.vendors.forEach(v=>{const items=[];DB.sections.forEach(s=>s.items.filter(i=>i.vendor===v.id).forEach(i=>items.push(i)));if(!items.length)return;const card=document.createElement('div');card.className='card';const n=items.filter(i=>(DB.qtys[i.id]||0)>0).length;const editId='oedit_'+v.id;
// header
const hd=document.createElement('div');hd.className='vhd';hd.innerHTML=`<span class="vname">${v.emoji} ${v.name}</span><div style="display:flex;align-items:center;gap:8px"><span class="vstatus">${n>0?n+'품목 입력됨':'미입력'}</span><button style="font-size:11px;color:var(--txt3);background:none;border:1px solid var(--border2);border-radius:6px;padding:3px 8px;font-family:inherit;cursor:pointer" onclick="toggleOEdit('${editId}')">편집</button></div>`;card.appendChild(hd);
// qty rows
items.forEach(item=>{const q=DB.qtys[item.id]||0;const row=document.createElement('div');row.className='orow';row.innerHTML=`<div class="oname"><div class="pname">${item.name}</div><div class="pnote">${item.note||''}</div></div><div class="qctrl"><button class="qbtn" onclick="chgQ('${item.id}',-1)">−</button><span class="qval${q===0?' z':''}" id="qv_${item.id}">${q}</span><button class="qbtn" onclick="chgQ('${item.id}',1)">+</button><span class="qunit">${item.unit}</span></div>`;card.appendChild(row);});
// edit section
const editDiv=document.createElement('div');editDiv.className='ocard-edit';editDiv.id=editId;items.forEach(item=>{const r=document.createElement('div');r.className='oedit-row';r.innerHTML=`<div class="oedit-name"><input value="${item.name}" onchange="renItem('${item.id}',this.value)"></div><span class="oedit-meta">${item.unit}</span><button class="oedit-ico cfg" onclick="openItemSh('${item.id}')">⚙</button><button class="oedit-ico del" onclick="if(confirm('삭제?'))delItemGlobal('${item.id}')">×</button>`;editDiv.appendChild(r);});const arow=document.createElement('div');arow.className='oadd-row';arow.innerHTML=`<input class="oadd-inp" placeholder="새 항목 이름..." id="onadd_${v.id}"><button class="oadd-btn" onclick="addItemToVendor('${v.id}')">+</button>`;editDiv.appendChild(arow);card.appendChild(editDiv);c.appendChild(card);});badge();}
function toggleOEdit(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
function delItemGlobal(iid){DB.sections.forEach(s=>{s.items=s.items.filter(i=>i.id!==iid);});save();renderOrder();}
function addItemToVendor(vid){const inp=document.getElementById('onadd_'+vid);const n=inp?.value.trim();if(!n)return;let placed=false;for(const s of DB.sections){if(s.items.some(i=>i.vendor===vid)){s.items.push({id:'i'+Date.now(),name:n,note:'',vendor:vid,unit:'개'});placed=true;break;}}if(!placed&&DB.sections.length)DB.sections[0].items.push({id:'i'+Date.now(),name:n,note:'',vendor:vid,unit:'개'});save();inp.value='';renderOrder();}
function chgQ(id,d){DB.qtys[id]=Math.max(0,(DB.qtys[id]||0)+d);save();const el=document.getElementById('qv_'+id);if(el){el.textContent=DB.qtys[id];el.className='qval'+(DB.qtys[id]===0?' z':'');}renderOrder();}
function badge(){const n=Object.values(DB.qtys).filter(v=>v>0).length;const b=document.getElementById('obdg');b.textContent=n;b.classList.toggle('on',n>0);}
function buildText(mode){const od=new Date(TODAY);od.setDate(TODAY.getDate()+1);const ds=od.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'}),line='─'.repeat(22);if(mode==='all'){let txt=`[SOIGNÉ 발주서]\n${ds}\n${line}\n`;let any=false;DB.vendors.forEach(v=>{const lines=[];DB.sections.forEach(s=>s.items.filter(i=>i.vendor===v.id&&(DB.qtys[i.id]||0)>0).forEach(i=>lines.push(`  · ${i.name}: ${DB.qtys[i.id]}${i.unit}`)));if(lines.length){txt+=`\n${v.emoji} ${v.name}\n${lines.join('\n')}\n`;any=true;}});if(!any)return null;return txt+`${line}\n총 ${Object.values(DB.qtys).filter(v=>v>0).length}품목`;}const parts=[];DB.vendors.forEach(v=>{const lines=[];DB.sections.forEach(s=>s.items.filter(i=>i.vendor===v.id&&(DB.qtys[i.id]||0)>0).forEach(i=>lines.push(`· ${i.name}: ${DB.qtys[i.id]}${i.unit}`)));if(lines.length)parts.push(`[SOIGNÉ 발주] ${v.emoji} ${v.name}\n${ds}\n\n${lines.join('\n')}\n\n총 ${lines.length}품목`);});return parts.length?parts.join('\n\n'+'═'.repeat(20)+'\n\n'):null;}
function openSend(mode){const txt=buildText(mode);if(!txt){showToast('발주 수량을 먼저 입력해주세요');return;}sendTxt=txt;document.getElementById('sbody').innerHTML=`<div class="stitle">${mode==='all'?'📋 전체 발주서':'💬 업체별 발주 메시지'}</div><div class="stext">${esc(txt)}</div><div class="sbtns"><button class="sbtn sub" onclick="closeOv()">닫기</button><button class="sbtn main" onclick="doCopy()">복사하기</button></div>`;document.getElementById('overlay').classList.add('on');}
function doCopy(){navigator.clipboard.writeText(sendTxt).catch(()=>{const ta=document.createElement('textarea');ta.value=sendTxt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});closeOv();showToast('✅ 복사됐어요!');if(curTab==='order'){const entry={id:Date.now(),date:new Date().toISOString(),text:sendTxt,items:Object.keys(DB.qtys).filter(k=>DB.qtys[k]>0).map(k=>{let f=null;DB.sections.forEach(s=>s.items.forEach(i=>{if(i.id===k)f=i;}));const v=f?DB.vendors.find(x=>x.id===f.vendor):null;return f?{name:f.name,qty:DB.qtys[k],unit:f.unit,vendorName:v?v.name:''}:null;}).filter(Boolean)};DB.history.unshift(entry);if(DB.history.length>50)DB.history.pop();save();setTimeout(()=>{if(confirm('발주 완료! 수량을 초기화할까요?')){DB.qtys={};save();renderOrder();}},600);}}
function renderHist(){const c=document.getElementById('histC');if(!DB.history.length){c.innerHTML=`<div class="empty"><span class="empty-ic">📋</span>발주 내역이 없습니다</div>`;return;}c.innerHTML='<div class="slbl">최근 발주 내역</div>';DB.history.forEach(e=>{const d=new Date(e.date),ds=d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),vm={};e.items.forEach(i=>{if(!vm[i.vendorName])vm[i.vendorName]=0;vm[i.vendorName]++;});const chips=Object.entries(vm).map(([n,cnt])=>`<span class="hchip">${n} ${cnt}품목</span>`).join('');const card=document.createElement('div');card.className='hcard';card.innerHTML=`<div class="hcard-top"><span class="hcard-date">${ds}</span><button class="hcard-view" onclick="viewHist(${e.id})">보기</button></div><div class="hchips">${chips}</div>`;c.appendChild(card);});}
function viewHist(id){const e=DB.history.find(x=>x.id===id);if(!e)return;sendTxt=e.text;const d=new Date(e.date);document.getElementById('sbody').innerHTML=`<div class="stitle">📋 ${d.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})} 발주서</div><div class="stext">${esc(e.text)}</div><div class="sbtns"><button class="sbtn sub" onclick="closeOv()">닫기</button><button class="sbtn main" onclick="doCopy()">복사</button></div>`;document.getElementById('overlay').classList.add('on');}
function renderEdit(){const c=document.getElementById('editC');c.innerHTML='';c.innerHTML=`<div class="etbar"><button class="etool${editMode==='prep'?' on':''}" onclick="setEM('prep')">🔪 작업 항목</button><button class="etool${editMode==='order'?' on':''}" onclick="setEM('order')">📦 발주 항목</button><button class="etool${editMode==='stock'?' on':''}" onclick="setEM('stock')">🫙 재고 항목</button><button class="etool${editMode==='vendor'?' on':''}" onclick="setEM('vendor')">🏪 업체 관리</button><button class="etool" onclick="doReset()">↺ 초기화</button></div>`;if(editMode==='prep')renderEditPrep(c);else if(editMode==='order')renderEditOrder(c);else if(editMode==='stock')renderEditStock(c);else renderEditVendor(c);}
function setEM(m){editMode=m;renderEdit();}
function renderEditPrep(c){const ab=document.createElement('button');ab.className='etool on';ab.style.marginBottom='11px';ab.textContent='+ 섹션 추가';ab.onclick=addSec;c.appendChild(ab);DB.sections.forEach(sec=>{const wrap=document.createElement('div');wrap.className='esec';wrap.innerHTML=`<div class="esec-head"><input class="esec-title" value="${sec.title}" onchange="renSec('${sec.id}',this.value)"><button class="eico del" onclick="if(confirm('삭제?'))delSec('${sec.id}')">🗑</button></div>`;const card=document.createElement('div');card.className='ecard';sec.items.forEach(item=>{const v=DB.vendors.find(x=>x.id===item.vendor);const row=document.createElement('div');row.className='erow';row.innerHTML=`<div class="ename"><input value="${item.name}" onchange="renItem('${item.id}',this.value)"></div><span class="emeta">${v?v.emoji:''} ${item.unit}</span><button class="eico cfg" onclick="openItemSh('${item.id}')">⚙</button><button class="eico del" onclick="if(confirm('삭제?'))delItem('${sec.id}','${item.id}')">×</button>`;card.appendChild(row);});const ar=document.createElement('div');ar.className='add-row';ar.innerHTML=`<input class="add-inp" placeholder="새 항목 이름..." id="ni_${sec.id}"><button class="add-btn" onclick="addItem('${sec.id}')">+</button>`;wrap.appendChild(card);wrap.appendChild(ar);c.appendChild(wrap);});}
function renderEditOrder(c){
// Group items by vendor for display
DB.vendors.forEach(v=>{
  const items=[];DB.sections.forEach(s=>s.items.filter(i=>i.vendor===v.id).forEach(i=>items.push(i)));
  if(!items.length)return;
  const lbl=document.createElement('div');lbl.className='slbl';lbl.textContent=v.emoji+' '+v.name;c.appendChild(lbl);
  const card=document.createElement('div');card.className='ecard';
  items.forEach(item=>{
    const row=document.createElement('div');row.className='erow';
    row.innerHTML=`<div class="ename"><input value="${item.name}" onchange="renItem('${item.id}',this.value)"></div><span class="emeta">${item.unit}</span><button class="eico cfg" onclick="openItemSh('${item.id}')">⚙</button><button class="eico del" onclick="if(confirm('삭제?'))delItemGlobal('${item.id}')">×</button>`;
    card.appendChild(row);
  });
  // Add item row for this vendor
  const ar=document.createElement('div');ar.className='add-row';
  ar.innerHTML=`<input class="add-inp" placeholder="새 항목 이름..." id="eni_${v.id}"><button class="add-btn" onclick="addItemToVendor('${v.id}')">+</button>`;
  const wrap=document.createElement('div');wrap.style.marginBottom='14px';
  wrap.appendChild(card);wrap.appendChild(ar);c.appendChild(wrap);
});
}
function renderEditStock(c){const lbl=document.createElement('div');lbl.className='slbl';lbl.textContent='재고 추적 항목';c.appendChild(lbl);const note=document.createElement('div');note.style.cssText='font-size:12px;color:var(--txt3);margin-bottom:10px;';note.textContent='이름을 탭해서 직접 수정할 수 있어요.';c.appendChild(note);const card=document.createElement('div');card.className='ecard';DB.stocks.forEach(st=>{const row=document.createElement('div');row.className='erow';row.innerHTML=`<div class="ename"><input value="${st.name}" onchange="renStock('${st.id}',this.value)"></div><span class="emeta">${st.unit}</span><button class="eico cfg" onclick="openStockSh('${st.id}')">⚙</button><button class="eico del" onclick="if(confirm('삭제?'))delStock('${st.id}')">×</button>`;card.appendChild(row);});c.appendChild(card);const addBtn=document.createElement('button');addBtn.className='etool on';addBtn.style.marginTop='10px';addBtn.textContent='+ 재고 항목 추가';addBtn.onclick=addStock;c.appendChild(addBtn);}
function renderEditVendor(c){const ab=document.createElement('button');ab.className='etool on';ab.style.marginBottom='11px';ab.textContent='+ 업체 추가';ab.onclick=addVendor;c.appendChild(ab);const card=document.createElement('div');card.className='ecard';DB.vendors.forEach(v=>{const cnt=DB.sections.reduce((a,s)=>a+s.items.filter(i=>i.vendor===v.id).length,0);const row=document.createElement('div');row.className='erow';row.innerHTML=`<span style="font-size:20px;flex-shrink:0">${v.emoji}</span><div class="ename"><input value="${v.name}" onchange="renVendor('${v.id}',this.value)"></div><span class="emeta">${cnt}품목</span><button class="eico cfg" onclick="openVendorSh('${v.id}')">⚙</button><button class="eico del" onclick="if(confirm('삭제?'))delVendor('${v.id}')">×</button>`;card.appendChild(row);});c.appendChild(card);}
function addSec(){const n=prompt('섹션 이름:');if(!n)return;DB.sections.push({id:'s'+Date.now(),title:n,items:[]});save();renderEdit();}
function renSec(id,v){const s=DB.sections.find(x=>x.id===id);if(s){s.title=v;save();}}
function delSec(id){DB.sections=DB.sections.filter(x=>x.id!==id);save();renderEdit();}
function addItem(sid){const inp=document.getElementById('ni_'+sid);const n=inp.value.trim();if(!n)return;const sec=DB.sections.find(s=>s.id===sid);sec.items.push({id:'i'+Date.now(),name:n,note:'',vendor:DB.vendors[0]?.id||'',unit:'개'});save();inp.value='';renderEdit();}
function renItem(id,v){DB.sections.forEach(s=>s.items.forEach(i=>{if(i.id===id)i.name=v;}));save();}
function delItem(sid,iid){const s=DB.sections.find(x=>x.id===sid);s.items=s.items.filter(i=>i.id!==iid);save();renderEdit();}
function addStock(){DB.stocks.push({id:'st'+Date.now(),name:'새 재고 항목',unit:'g'});save();renderEdit();}
function delStock(id){DB.stocks=DB.stocks.filter(x=>x.id!==id);save();renderEdit();}
function openStockSh(sid){const st=DB.stocks.find(x=>x.id===sid);if(!st)return;const units=['g','kg','ml','L','개','팩','병','캔','통','장'];const uopts=units.map(u=>`<option value="${u}"${u===st.unit?' selected':''}>${u}</option>`).join('');document.getElementById('sbody').innerHTML=`<div class="stitle">재고 항목 편집</div><div class="sfield"><label>항목 이름</label><input id="sst_n" value="${st.name}"></div><div class="sfield"><label>단위</label><select id="sst_u">${uopts}</select></div><div class="sbtns" style="margin-top:4px"><button class="sbtn sub" onclick="closeOv()">취소</button><button class="sbtn main" onclick="saveStockEdit('${sid}')">저장</button></div>`;document.getElementById('overlay').classList.add('on');}
function saveStockEdit(sid){const st=DB.stocks.find(x=>x.id===sid);if(st){st.name=document.getElementById('sst_n').value;st.unit=document.getElementById('sst_u').value;}save();closeOv();renderEdit();renderStock();showToast('저장됐어요');}
function addVendor(){DB.vendors.push({id:'v'+Date.now(),name:'새 업체',emoji:'🏪',contact:''});save();renderEdit();}
function renVendor(id,v){const x=DB.vendors.find(x=>x.id===id);if(x){x.name=v;save();}}
function delVendor(id){DB.vendors=DB.vendors.filter(x=>x.id!==id);save();renderEdit();}
function openVendorSh(vid){const v=DB.vendors.find(x=>x.id===vid);if(!v)return;const emojis=['🐟','🥬','🏪','🛒','🧈','🥩','🍜','🍷','🧂','🐄','🌾','🍋','🧅','🥚'];const eopts=emojis.map(e=>`<option value="${e}"${e===v.emoji?' selected':''}>${e}</option>`).join('');document.getElementById('sbody').innerHTML=`<div class="stitle">업체 편집</div><div class="sfrow"><div class="sfield" style="flex:0 0 80px"><label>아이콘</label><select id="sv_e" style="text-align:center;font-size:18px">${eopts}</select></div><div class="sfield"><label>업체명</label><input id="sv_n" value="${v.name}"></div></div><div class="sfield"><label>연락처 / 메모</label><input id="sv_c" value="${v.contact||''}" placeholder="카카오톡 ID, 전화번호..."></div><div class="sbtns" style="margin-top:4px"><button class="sbtn sub" onclick="closeOv()">취소</button><button class="sbtn main" onclick="saveVendorSh('${vid}')">저장</button></div>`;document.getElementById('overlay').classList.add('on');}
function saveVendorSh(vid){const v=DB.vendors.find(x=>x.id===vid);if(v){v.emoji=document.getElementById('sv_e').value;v.name=document.getElementById('sv_n').value;v.contact=document.getElementById('sv_c').value;}save();closeOv();renderEdit();showToast('업체 저장됐어요');}
function openItemSh(iid){let item=null;DB.sections.forEach(s=>s.items.forEach(i=>{if(i.id===iid)item=i;}));if(!item)return;const vopts=DB.vendors.map(v=>`<option value="${v.id}"${v.id===item.vendor?' selected':''}>${v.emoji} ${v.name}</option>`).join('');const units=['개','kg','g','ml','L','병','팩','판','묶음','인분','장','회','조각','봉'];const uopts=units.map(u=>`<option value="${u}"${u===item.unit?' selected':''}>${u}</option>`).join('');document.getElementById('sbody').innerHTML=`<div class="stitle">항목 편집</div><div class="sfield"><label>항목 이름</label><input id="si_n" value="${item.name}"></div><div class="sfield"><label>메모</label><input id="si_note" value="${item.note||''}" placeholder="작업 메모..."></div><div class="sfrow"><div class="sfield"><label>발주 업체</label><select id="si_v">${vopts}</select></div><div class="sfield"><label>단위</label><select id="si_u">${uopts}</select></div></div><div class="sbtns" style="margin-top:4px"><button class="sbtn sub" onclick="closeOv()">취소</button><button class="sbtn main" onclick="saveItem('${iid}')">저장</button></div>`;document.getElementById('overlay').classList.add('on');}
function saveItem(iid){DB.sections.forEach(s=>s.items.forEach(i=>{if(i.id===iid){i.name=document.getElementById('si_n').value;i.note=document.getElementById('si_note').value;i.vendor=document.getElementById('si_v').value;i.unit=document.getElementById('si_u').value;}}));save();closeOv();renderEdit();showToast('저장됐어요');}
function doReset(){if(!confirm('항목을 기본값으로 초기화합니까?\n(체크·발주 내역은 유지)'))return;DB.vendors=JSON.parse(JSON.stringify(DEFAULTS.vendors));DB.sections=JSON.parse(JSON.stringify(DEFAULTS.sections));DB.stocks=JSON.parse(JSON.stringify(DEFAULTS.stocks));save();renderEdit();showToast('기본값으로 복원됐어요');}
function closeOv(e){if(!e||e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('on');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2600);}
init();
</script>
</body>
</html>
